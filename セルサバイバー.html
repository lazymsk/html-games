<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>セルサバイバー</title>
<style>
  /* ==============================
     全体レイアウト
     ============================== */
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #101418;
    color: #eee;
    font-family: "Segoe UI", "Hiragino Sans", "Meiryo", sans-serif;
    overflow: hidden;
  }
  #game-canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    background: #182420;
  }

  /* ==============================
     オーバーレイ共通（タイトル / レベルアップ / 結果）
     ============================== */
  .overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.65);
    z-index: 10;
  }
  .overlay.hidden { display: none; }
  .overlay h1 {
    font-size: 3rem;
    margin: 0 0 0.5rem;
    text-shadow: 0 0 12px #4fd;
  }
  .overlay p { margin: 0.3rem 0; color: #ccc; }
  .overlay button {
    margin-top: 1.5rem;
    padding: 0.8rem 2.5rem;
    font-size: 1.2rem;
    color: #fff;
    background: #2a7;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
  .overlay button:hover { background: #3c9; }

  /* レベルアップ時のアップグレード選択カード（上下キーで選ぶため縦並び） */
  #upgrade-cards {
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
    margin-top: 1rem;
  }
  .upgrade-card {
    width: 340px;
    padding: 0.8rem 1rem;
    background: #223;
    border: 2px solid #4fd;
    border-radius: 10px;
    cursor: pointer;
    text-align: center;
    transition: transform 0.1s;
  }
  /* キーボード／マウスで選択中のカード */
  .upgrade-card.selected {
    transform: scale(1.05);
    background: #2a4a44;
    border-color: #ffdd55;
  }
  .upgrade-card h3 { margin: 0 0 0.5rem; font-size: 1.1rem; color: #4fd; }
  .upgrade-card p { font-size: 0.85rem; color: #bbb; }
</style>
</head>
<body>

<canvas id="game-canvas"></canvas>

<!-- タイトル画面 -->
<div id="title-screen" class="overlay">
  <h1>セルサバイバー</h1>
  <p>移動：WASD または 矢印キー ／ 攻撃：自動</p>
  <p>制限時間まで生き残ればクリア！ 中ボスは1分ごと、残り1分でラスボスが出現！</p>
  <p>特殊武器「貫通弾」「波動オーラ」はレベルアップで習得できる</p>
  <button id="start-button">スタート</button>
</div>

<!-- レベルアップ画面 -->
<div id="levelup-screen" class="overlay hidden">
  <h1 style="font-size:2rem;">レベルアップ！</h1>
  <p>強化を1つ選んでください（↑↓キーで選択・Enterで決定）</p>
  <div id="upgrade-cards"></div>
</div>

<!-- リザルト画面（ゲームオーバー / クリア共用） -->
<div id="result-screen" class="overlay hidden">
  <h1 id="result-title"></h1>
  <p id="result-detail"></p>
  <button id="retry-button">もう一度あそぶ</button>
</div>

<script>
"use strict";

/* =====================================================================
 * セルサバイバー（MVP）
 *
 * 構成：
 *   1. 設定（CONFIG / ENEMY_TYPES / STAGES / UPGRADES）… 調整はここだけで完結
 *   2. アセット読み込み（敵画像の背景を透過処理）
 *   3. ゲーム状態（player / enemies / bullets / gems）
 *   4. 更新ロジック（update系）
 *   5. 描画（draw系）
 *   6. メインループ・画面遷移
 *
 * ステージ追加方法：STAGES 配列にオブジェクトを追加するだけ。
 * 敵の種類追加方法：ENEMY_TYPES にエントリを追加し、ステージの spawns から参照する。
 * =================================================================== */

/* ==============================
 * 1. 設定
 * ============================== */

// 全体バランス調整用の定数
const CONFIG = {
  player: {
    radius: 18,          // 当たり判定の半径（px）
    moveSpeed: 220,      // 移動速度（px/秒）
    maxHp: 100,
    hitCooldown: 0.5,    // 被弾後の無敵時間（秒）
    magnetRadius: 80,    // 経験値ジェムを引き寄せる半径（px）
  },
  // 武器の初期性能。bullet は最初から所持、pierce / aura はレベルアップで習得する
  weapons: {
    bullet: { interval: 0.6, damage: 10,  count: 1, speed: 480 },  // マジックショット（通常弾）
    pierce: { interval: 1.6, damage: 12,  count: 1, speed: 380 },  // 貫通弾（敵を貫通して複数体に当たる）
    aura:   { tick: 0.5,     damage: 4.8, radius: 90 },            // 波動オーラ（周囲への継続範囲攻撃）
  },
  // 強化に必要なジェム数。基本7個で、5レベルごとに必要数が1個増える
  // （Lv1〜5：7個、Lv6〜10：8個、Lv11〜15：9個 …）
  xpToLevel: level => 7 + Math.floor((level - 1) / 5),
  gemXp: 1,            // ジェム1個の経験値
};

// 敵の種類定義。画像は ASSETS.enemyImages[imageKey] を参照する
const ENEMY_TYPES = {
  // 通常敵：ウイルス（スプライトは makeVirusSprite() でコード生成）
  virus: {
    imageKey: "virus",
    radius: 18,        // 当たり判定の半径（px）
    drawSize: 48,      // 描画サイズ（px、正方形）
    hp: 14,
    speed: 90,         // 移動速度（px/秒）
    damage: 8,         // 接触ダメージ
    xpDrop: 1,         // 倒したとき落とすジェムの数
  },
  // 中ボス：セルモンスター（埋め込みJPG画像）
  cellBoss: {
    imageKey: "cell1",
    radius: 72,
    drawSize: 200,
    hp: 1500,
    speed: 82.5,
    damage: 25,
    xpDrop: 12,
    isBoss: true,      // HPバー常時表示などボス扱いにするフラグ
  },
  // ラスボス：きのこウイルス（埋め込みJPG画像）。中ボスのHP2倍・サイズ1.5倍
  finalBoss: {
    imageKey: "final1",
    radius: 105,
    drawSize: 300,
    hp: 3000,
    speed: 75,
    damage: 35,
    xpDrop: 25,
    isBoss: true,
  },
};

// ステージ定義。配列に追加すれば新ステージを作れる
const STAGES = [
  {
    name: "ステージ1",
    duration: 180,  // 生存目標時間（秒）。超えたらクリア
    background: { gridColor: "#243830", groundColor: "#182420" },
    // 時間帯ごとの出現ルール。from〜to（秒）の間、interval 秒ごとに敵を1体出す
    // hpScale / speedScale で同じ敵タイプを時間経過とともに強化する
    spawns: [
      { from:   0, to:  60, interval: 1.1,  enemy: "virus", hpScale: 1.0, speedScale: 1.0 },
      { from:  60, to: 120, interval: 0.7,  enemy: "virus", hpScale: 1.6, speedScale: 1.1 },
      { from: 120, to: 180, interval: 0.45, enemy: "virus", hpScale: 2.4, speedScale: 1.2 },
    ],
    // ボスの出現ルール
    //   every: N … N秒ごとに繰り返し出現（中ボス向け）
    //   at:    N … N秒の時点で1回だけ出現（ラスボス向け）
    bossSpawns: [
      { every: 60, enemy: "cellBoss",  message: "中ボス出現！" },
      { at:   120, enemy: "finalBoss", message: "ラスボス出現！！" },  // 残り1分（duration - 60）
    ],
  },
];

// レベルアップ時に提示される強化の候補
// 特殊武器（貫通弾・波動オーラ）は未習得なら習得、習得済みなら強化になる
const UPGRADES = [
  { name: "攻撃力アップ",   desc: "ショットのダメージ +5",      apply: p => { p.weapons.bullet.damage += 5; } },
  { name: "連射アップ",     desc: "ショットの発射間隔 -12%",    apply: p => { p.weapons.bullet.interval *= 0.88; } },
  { name: "弾数アップ",     desc: "ショットの同時発射数 +2",    apply: p => { p.weapons.bullet.count += 2; } },
  { name: "スピードアップ", desc: "移動速度 +12%",              apply: p => { p.moveSpeed *= 1.12; } },
  { name: "最大HPアップ",   desc: "最大HP +20 ＆ HP全回復",     apply: p => { p.maxHp += 20; p.hp = p.maxHp; } },
  { name: "マグネット",     desc: "ジェム吸引範囲 +40%",        apply: p => { p.magnetRadius *= 1.4; } },
  { name: "貫通弾",         desc: "習得（習得済なら弾数+1・ダメージ+10%）",
    apply: p => {
      const w = p.weapons.pierce;
      if (!w.owned) { w.owned = true; } else { w.count += 1; w.damage *= 1.10; }
    } },
  { name: "波動オーラ",     desc: "習得（習得済なら範囲+25%・ダメージ+2）",
    apply: p => {
      const w = p.weapons.aura;
      if (!w.owned) { w.owned = true; } else { w.radius *= 1.25; w.damage += 2; }
    } },
];

/* ==============================
 * 2. アセット読み込み
 * ============================== */

// 各画像の加工設定
//   removeBg: "white" = 白に近い色をすべて透過 ／ "edge" = 画像の外周につながる灰色背景だけを透過
//   cropTop : 上部を切り落とす割合（画像に焼き込まれた文字やゲージを除くため）
const ENEMY_IMAGE_OPTIONS = {
  cell1:  { removeBg: "white" },
  final1: { removeBg: "edge", cropTop: 0.12 },
};

const ASSETS = { enemyImages: {} };

// 画像を読み込み、背景を透明化した canvas を返す
function loadEnemyImage(src, options = {}) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      // 上部の切り落とし（焼き込まれたタイトル文字などの除去）
      const cropTop = Math.floor(img.height * (options.cropTop ?? 0));
      const c = document.createElement("canvas");
      c.width = img.width;
      c.height = img.height - cropTop;
      const cx = c.getContext("2d");
      cx.drawImage(img, 0, -cropTop);

      if (options.removeBg === "white") removeWhiteBackground(cx, c.width, c.height);
      if (options.removeBg === "edge")  removeEdgeBackground(cx, c.width, c.height);
      resolve(c);
    };
    img.onerror = reject;
    img.src = src;
  });
}

// 白に近いピクセルをすべて透明にする（白背景のJPG用）
function removeWhiteBackground(cx, w, h) {
  const data = cx.getImageData(0, 0, w, h);
  const px = data.data;
  const THRESHOLD = 235;  // これよりRGBすべてが明るいピクセルを透明にする
  for (let i = 0; i < px.length; i += 4) {
    if (px[i] > THRESHOLD && px[i + 1] > THRESHOLD && px[i + 2] > THRESHOLD) {
      px[i + 3] = 0;
    }
  }
  cx.putImageData(data, 0, 0);
}

// 画像の外周からつながっている「彩度の低い灰色」を塗りつぶし式に透明化する
// （キャラ本体の灰色模様は黒い輪郭線で囲われていて外周とつながらないため残る）
function removeEdgeBackground(cx, w, h) {
  const data = cx.getImageData(0, 0, w, h);
  const px = data.data;

  // 背景とみなす条件：ほぼ無彩色で中間の明るさ（キャラの黒い輪郭線は残す）
  const isGray = p => {
    const r = px[p * 4], g = px[p * 4 + 1], b = px[p * 4 + 2];
    const max = Math.max(r, g, b), min = Math.min(r, g, b);
    return (max - min) < 20 && max > 50 && max < 210;
  };

  const visited = new Uint8Array(w * h);
  const stack = [];
  // 外周の全ピクセルを塗りつぶしの起点にする
  for (let x = 0; x < w; x++) { stack.push(x, (h - 1) * w + x); }
  for (let y = 0; y < h; y++) { stack.push(y * w, y * w + (w - 1)); }

  while (stack.length > 0) {
    const p = stack.pop();
    if (visited[p] || !isGray(p)) continue;
    visited[p] = 1;
    px[p * 4 + 3] = 0;  // 透明化
    const x = p % w;
    const y = (p / w) | 0;
    if (x > 0)     stack.push(p - 1);
    if (x < w - 1) stack.push(p + 1);
    if (y > 0)     stack.push(p - w);
    if (y < h - 1) stack.push(p + w);
  }
  cx.putImageData(data, 0, 0);
}

// 通常敵「ウイルス」のスプライトをコードで生成する（外部画像不要）
// コロナウイルス風：トゲの生えた球体＋斑点＋目
function makeVirusSprite() {
  const SIZE = 96;  // スプライトの元解像度（描画時に縮小される）
  const c = document.createElement("canvas");
  c.width = c.height = SIZE;
  const cx = c.getContext("2d");
  const center = SIZE / 2;

  // 周囲のトゲ（先端に玉のある突起）
  const SPIKES = 10;
  cx.lineWidth = 6;
  cx.lineCap = "round";
  for (let i = 0; i < SPIKES; i++) {
    const a = (i / SPIKES) * Math.PI * 2;
    cx.strokeStyle = "#7a3fa0";
    cx.beginPath();
    cx.moveTo(center + Math.cos(a) * SIZE * 0.28, center + Math.sin(a) * SIZE * 0.28);
    cx.lineTo(center + Math.cos(a) * SIZE * 0.42, center + Math.sin(a) * SIZE * 0.42);
    cx.stroke();
    cx.fillStyle = "#b06fd8";
    cx.beginPath();
    cx.arc(center + Math.cos(a) * SIZE * 0.44, center + Math.sin(a) * SIZE * 0.44, SIZE * 0.05, 0, Math.PI * 2);
    cx.fill();
  }

  // 本体（左上から光が当たったような球体グラデーション）
  const grad = cx.createRadialGradient(
    center - SIZE * 0.08, center - SIZE * 0.08, SIZE * 0.05,
    center, center, SIZE * 0.32
  );
  grad.addColorStop(0, "#c98fe8");
  grad.addColorStop(1, "#6a2e91");
  cx.fillStyle = grad;
  cx.beginPath();
  cx.arc(center, center, SIZE * 0.32, 0, Math.PI * 2);
  cx.fill();

  // 表面の斑点（[中心からのXオフセット, Yオフセット, 半径] を SIZE 比で指定）
  cx.fillStyle = "rgba(60, 20, 90, 0.5)";
  for (const [ox, oy, r] of [[-0.14, 0.08, 0.06], [0.13, 0.12, 0.05], [0.03, -0.18, 0.04]]) {
    cx.beginPath();
    cx.arc(center + ox * SIZE, center + oy * SIZE, r * SIZE, 0, Math.PI * 2);
    cx.fill();
  }

  // 目（左右対称）
  for (const side of [-1, 1]) {
    const ex = center + side * SIZE * 0.10;
    const ey = center - SIZE * 0.02;
    cx.fillStyle = "#fff";
    cx.beginPath();
    cx.arc(ex, ey, SIZE * 0.055, 0, Math.PI * 2);
    cx.fill();
    cx.fillStyle = "#201030";
    cx.beginPath();
    cx.arc(ex, ey + SIZE * 0.015, SIZE * 0.028, 0, Math.PI * 2);
    cx.fill();
  }

  return c;
}

async function loadAssets() {
  for (const [key, src] of Object.entries(ENEMY_IMAGE_SOURCES)) {
    ASSETS.enemyImages[key] = await loadEnemyImage(src, ENEMY_IMAGE_OPTIONS[key]);
  }
  // コード生成スプライトもここで登録する
  ASSETS.enemyImages.virus = makeVirusSprite();
}

/* ==============================
 * 3. ゲーム状態
 * ============================== */

const canvas = document.getElementById("game-canvas");
const ctx = canvas.getContext("2d");

// 画面サイズをウィンドウに合わせる

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

// ゲーム全体の状態。"title" | "playing" | "levelup" | "result"
let gameState = "title";

let stage = null;       // 現在のステージ定義（STAGES の要素）
let stageTime = 0;      // ステージ経過時間（秒）
let player = null;
let enemies = [];
let bullets = [];
let gems = [];
let killCount = 0;
let spawnTimers = [];   // spawns の各ルールごとの次回出現までの残り時間

let message = null;     // 画面中央に一時表示するお知らせ {text, timer}

// キー入力状態
const keys = {};
window.addEventListener("keydown", e => { keys[e.key.toLowerCase()] = true; });
window.addEventListener("keyup",   e => { keys[e.key.toLowerCase()] = false; });

// ステージを初期化してプレイ開始できる状態にする
function initStage(stageIndex) {
  stage = STAGES[stageIndex];
  stageTime = 0;
  killCount = 0;
  enemies = [];
  bullets = [];
  gems = [];
  spawnTimers = stage.spawns.map(() => 0);
  bossSpawned = (stage.bossSpawns ?? []).map(() => 0);
  message = null;

  const c = CONFIG.player;
  player = {
    x: 0, y: 0,               // ワールド座標（カメラはプレイヤーを追従）
    radius: c.radius,
    moveSpeed: c.moveSpeed,
    maxHp: c.maxHp,
    hp: c.maxHp,
    magnetRadius: c.magnetRadius,
    hitTimer: 0,              // 残り無敵時間
    level: 1,
    xp: 0,
    // 武器の所持状態と性能（CONFIG.weapons のコピーに timer / owned を加えたもの）
    weapons: {
      bullet: { ...CONFIG.weapons.bullet, timer: 0 },
      pierce: { ...CONFIG.weapons.pierce, timer: 0, owned: false },
      aura:   { ...CONFIG.weapons.aura,   timer: 0, owned: false },
    },
  };
}

/* ==============================
 * 4. 更新ロジック
 * ============================== */

function update(dt) {
  stageTime += dt;

  // ステージクリア判定
  if (stageTime >= stage.duration) {
    showResult(true);
    return;
  }

  updatePlayer(dt);
  updateWeapons(dt);
  updateSpawns(dt);
  updateEnemies(dt);
  updateBullets(dt);
  updateGems(dt);
  updateMessage(dt);

  // 倒された敵をまとめて除去（killEnemy は dead フラグを立てるだけ）
  enemies = enemies.filter(e => !e.dead);
}

function updatePlayer(dt) {
  // --- 移動 ---
  let dx = 0, dy = 0;
  if (keys["w"] || keys["arrowup"])    dy -= 1;
  if (keys["s"] || keys["arrowdown"])  dy += 1;
  if (keys["a"] || keys["arrowleft"])  dx -= 1;
  if (keys["d"] || keys["arrowright"]) dx += 1;
  if (dx !== 0 || dy !== 0) {
    const len = Math.hypot(dx, dy);
    player.x += (dx / len) * player.moveSpeed * dt;
    player.y += (dy / len) * player.moveSpeed * dt;
  }

  // --- 無敵時間の減算 ---
  if (player.hitTimer > 0) player.hitTimer -= dt;
}

// 所持している武器それぞれの発動タイマーを進める
function updateWeapons(dt) {
  const ws = player.weapons;

  // マジックショット（通常弾）：最初から所持
  ws.bullet.timer -= dt;
  if (ws.bullet.timer <= 0 && enemies.length > 0) {
    ws.bullet.timer = ws.bullet.interval;
    fireBullets(ws.bullet, false);
  }

  // 貫通弾：敵を貫通して複数体に当たる
  if (ws.pierce.owned) {
    ws.pierce.timer -= dt;
    if (ws.pierce.timer <= 0 && enemies.length > 0) {
      ws.pierce.timer = ws.pierce.interval;
      fireBullets(ws.pierce, true);
    }
  }

  // 波動オーラ：一定間隔で周囲の敵全員にダメージ
  if (ws.aura.owned) {
    ws.aura.timer -= dt;
    if (ws.aura.timer <= 0) {
      ws.aura.timer = ws.aura.tick;
      auraDamage(ws.aura);
    }
  }
}

// 最寄りの敵に向けて弾を撃つ
// 通常弾は扇形に広げ、貫通弾は全弾同じ方向へ横一列に並べて撃つ
function fireBullets(weapon, pierce) {
  let nearest = null;
  let nearestDist = Infinity;
  for (const e of enemies) {
    const d = Math.hypot(e.x - player.x, e.y - player.y);
    if (d < nearestDist) { nearestDist = d; nearest = e; }
  }
  if (!nearest) return;

  const baseAngle = Math.atan2(nearest.y - player.y, nearest.x - player.x);
  const SPREAD = 0.25;      // 通常弾：弾同士の角度差（ラジアン）
  const LINE_SPACING = 22;  // 貫通弾：横一列に並べる間隔（px）
  for (let i = 0; i < weapon.count; i++) {
    const offset = i - (weapon.count - 1) / 2;  // 中央を0とした並び位置
    const angle = pierce ? baseAngle : baseAngle + offset * SPREAD;
    // 貫通弾は進行方向と直角にずらして横並びにする
    const sideX = pierce ? Math.cos(baseAngle + Math.PI / 2) * offset * LINE_SPACING : 0;
    const sideY = pierce ? Math.sin(baseAngle + Math.PI / 2) * offset * LINE_SPACING : 0;
    bullets.push({
      x: player.x + sideX,
      y: player.y + sideY,
      vx: Math.cos(angle) * weapon.speed,
      vy: Math.sin(angle) * weapon.speed,
      radius: pierce ? 9 : 6,
      damage: weapon.damage,
      life: pierce ? 1.6 : 2,  // 寿命（秒）。当たらなければ消える
      pierce,
      hitEnemies: pierce ? new Set() : null,  // 貫通弾が既に当てた敵（同じ敵への多段ヒット防止）
    });
  }
}

// オーラの範囲内にいる敵すべてにダメージを与える
function auraDamage(aura) {
  for (const e of enemies) {
    if (e.dead) continue;
    const d = Math.hypot(e.x - player.x, e.y - player.y);
    if (d < aura.radius + e.radius) {
      e.hp -= aura.damage;
      if (e.hp <= 0) killEnemy(e);
    }
  }
}

// ステージ定義の spawns / bossSpawns に従って敵を出現させる
function updateSpawns(dt) {
  stage.spawns.forEach((rule, i) => {
    if (stageTime < rule.from || stageTime >= rule.to) return;
    spawnTimers[i] -= dt;
    if (spawnTimers[i] <= 0) {
      spawnTimers[i] = rule.interval;
      spawnEnemy(rule);
    }
  });

  // ボス出現ルール（every: N秒ごとに繰り返し ／ at: 指定時刻に1回だけ）
  (stage.bossSpawns ?? []).forEach((rule, i) => {
    if (rule.every) {
      const due = (bossSpawned[i] + 1) * rule.every;  // 次の出現予定時刻
      if (stageTime >= due && due < stage.duration) {
        bossSpawned[i]++;
        spawnEnemy(rule);
        showMessage(rule.message ?? "ボス出現！");
      }
    } else if (bossSpawned[i] === 0 && stageTime >= rule.at) {
      bossSpawned[i] = 1;
      spawnEnemy(rule);
      showMessage(rule.message ?? "ボス出現！", 3);
    }
  });
}

// 画面中央に一時的なお知らせを出す
function showMessage(text, duration = 2.5) {
  message = { text, timer: duration };
}

function updateMessage(dt) {
  if (message) {
    message.timer -= dt;
    if (message.timer <= 0) message = null;
  }
}

// 画面の少し外側のランダムな位置に敵を1体出す
function spawnEnemy(rule) {
  const type = ENEMY_TYPES[rule.enemy];
  const margin = 60;  // 画面端からの出現距離（px）
  const halfW = canvas.width / 2 + margin;
  const halfH = canvas.height / 2 + margin;

  // 画面の上下左右いずれかの辺の外にランダム配置
  let x, y;
  if (Math.random() < 0.5) {
    x = player.x + (Math.random() * 2 - 1) * halfW;
    y = player.y + (Math.random() < 0.5 ? -halfH : halfH);
  } else {
    x = player.x + (Math.random() < 0.5 ? -halfW : halfW);
    y = player.y + (Math.random() * 2 - 1) * halfH;
  }

  enemies.push({
    type,
    x, y,
    hp: type.hp * (rule.hpScale ?? 1),
    maxHp: type.hp * (rule.hpScale ?? 1),
    speed: type.speed * (rule.speedScale ?? 1),
    radius: type.radius,
    wobblePhase: Math.random() * Math.PI * 2,  // 揺れアニメの位相ずらし
  });
}

function updateEnemies(dt) {
  for (const e of enemies) {
    if (e.dead) continue;  // オーラなどで今フレーム倒された敵はスキップ
    // プレイヤーに向かって直進
    const dx = player.x - e.x;
    const dy = player.y - e.y;
    const dist = Math.hypot(dx, dy) || 1;
    e.x += (dx / dist) * e.speed * dt;
    e.y += (dy / dist) * e.speed * dt;

    // プレイヤーとの接触ダメージ（無敵時間中は無効）
    if (dist < e.radius + player.radius && player.hitTimer <= 0) {
      player.hp -= e.type.damage;
      player.hitTimer = CONFIG.player.hitCooldown;
      if (player.hp <= 0) {
        player.hp = 0;
        showResult(false);
        return;
      }
    }
  }
}

function updateBullets(dt) {
  for (const b of bullets) {
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.life -= dt;
    if (b.life <= 0) continue;

    // 敵との当たり判定。通常弾は最初の1体で消滅、貫通弾は当たっても消えず先へ進む
    for (const e of enemies) {
      if (e.dead) continue;
      if (b.pierce && b.hitEnemies.has(e)) continue;
      const d = Math.hypot(e.x - b.x, e.y - b.y);
      if (d < e.radius + b.radius) {
        e.hp -= b.damage;
        if (e.hp <= 0) killEnemy(e);
        if (b.pierce) {
          b.hitEnemies.add(e);
        } else {
          b.life = 0;  // 通常弾は消滅
          break;
        }
      }
    }
  }
  bullets = bullets.filter(b => b.life > 0);
}

// 敵を倒したときの処理：カウントとジェムのドロップ
// dead フラグを立てるだけで、配列からの除去は update() の最後でまとめて行う
function killEnemy(enemy) {
  if (enemy.dead) return;  // 同一フレームの多重撃破を防ぐ
  enemy.dead = true;
  killCount++;
  for (let i = 0; i < enemy.type.xpDrop; i++) {
    gems.push({
      x: enemy.x + (Math.random() * 2 - 1) * 20,
      y: enemy.y + (Math.random() * 2 - 1) * 20,
      radius: 6,
    });
  }
}

function updateGems(dt) {
  const MAGNET_SPEED = 400;  // 吸引されるときの移動速度（px/秒）
  for (const g of gems) {
    const dx = player.x - g.x;
    const dy = player.y - g.y;
    const dist = Math.hypot(dx, dy) || 1;

    // 吸引範囲内ならプレイヤーへ引き寄せる
    if (dist < player.magnetRadius) {
      g.x += (dx / dist) * MAGNET_SPEED * dt;
      g.y += (dy / dist) * MAGNET_SPEED * dt;
    }
    // 取得判定
    if (dist < player.radius + g.radius) {
      g.taken = true;
      gainXp(CONFIG.gemXp);
    }
  }
  gems = gems.filter(g => !g.taken);
}

function gainXp(amount) {
  player.xp += amount;
  const needed = CONFIG.xpToLevel(player.level);
  if (player.xp >= needed) {
    player.xp -= needed;
    player.level++;
    showLevelUp();
  }
}

/* ==============================
 * 5. 描画
 * ============================== */

function draw() {
  const w = canvas.width;
  const h = canvas.height;

  // 背景
  ctx.fillStyle = stage.background.groundColor;
  ctx.fillRect(0, 0, w, h);

  // カメラ：プレイヤーが常に画面中央
  const camX = player.x - w / 2;
  const camY = player.y - h / 2;

  drawGrid(camX, camY, w, h);

  ctx.save();
  ctx.translate(-camX, -camY);
  drawAura();
  drawGems();
  drawBullets();
  drawEnemies();
  drawPlayer();
  ctx.restore();

  drawHud(w, h);
}

// 地面のグリッド線（移動感を出すため）
function drawGrid(camX, camY, w, h) {
  const SIZE = 80;  // グリッド1マスの大きさ（px）
  ctx.strokeStyle = stage.background.gridColor;
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let x = -(camX % SIZE); x < w; x += SIZE) {
    ctx.moveTo(x, 0);
    ctx.lineTo(x, h);
  }
  for (let y = -(camY % SIZE); y < h; y += SIZE) {
    ctx.moveTo(0, y);
    ctx.lineTo(w, y);
  }
  ctx.stroke();
}

// 波動オーラの効果範囲（習得時のみ）。ダメージ間隔に合わせて脈打つ
function drawAura() {
  const aura = player.weapons.aura;
  if (!aura.owned) return;

  const pulse = 1 - aura.timer / aura.tick;  // 0（発動直後）→ 1（次の発動直前）
  ctx.fillStyle = "rgba(150, 220, 255, 0.08)";
  ctx.beginPath();
  ctx.arc(player.x, player.y, aura.radius, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = `rgba(150, 220, 255, ${0.6 - 0.4 * pulse})`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(player.x, player.y, aura.radius * (0.85 + 0.15 * pulse), 0, Math.PI * 2);
  ctx.stroke();
}

function drawPlayer() {
  const { x, y, radius } = player;

  // 被弾直後は点滅させる
  if (player.hitTimer > 0 && Math.floor(player.hitTimer * 10) % 2 === 0) return;

  // 本体（細胞っぽい二重円）
  ctx.fillStyle = "#39c5bb";
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = "#7fe8e0";
  ctx.beginPath();
  ctx.arc(x, y, radius * 0.55, 0, Math.PI * 2);
  ctx.fill();
  // 核
  ctx.fillStyle = "#1a6b64";
  ctx.beginPath();
  ctx.arc(x, y, radius * 0.25, 0, Math.PI * 2);
  ctx.fill();
}

function drawEnemies() {
  const t = performance.now() / 1000;
  for (const e of enemies) {
    const img = ASSETS.enemyImages[e.type.imageKey];
    const size = e.type.drawSize;
    // ふわふわ揺れるアニメーション
    const wobble = Math.sin(t * 4 + e.wobblePhase) * 0.1;

    ctx.save();
    ctx.translate(e.x, e.y);
    ctx.rotate(wobble);
    ctx.drawImage(img, -size / 2, -size / 2, size, size);
    ctx.restore();

    // HPバー：ボスは常時表示（太め）、通常敵はHPが減っているときのみ
    if (e.type.isBoss || e.hp < e.maxHp) {
      const barW = size * 0.7;
      const barH = e.type.isBoss ? 7 : 4;
      const ratio = Math.max(0, e.hp / e.maxHp);
      ctx.fillStyle = "#400";
      ctx.fillRect(e.x - barW / 2, e.y - size / 2 - 8 - barH, barW, barH);
      ctx.fillStyle = "#f44";
      ctx.fillRect(e.x - barW / 2, e.y - size / 2 - 8 - barH, barW * ratio, barH);
    }
  }
}

function drawBullets() {
  for (const b of bullets) {
    ctx.fillStyle = b.pierce ? "#c58fff" : "#ffe066";  // 貫通弾は紫、通常弾は黄
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawGems() {
  ctx.fillStyle = "#5cf";
  for (const g of gems) {
    // ひし形で描画
    ctx.beginPath();
    ctx.moveTo(g.x, g.y - g.radius);
    ctx.lineTo(g.x + g.radius, g.y);
    ctx.lineTo(g.x, g.y + g.radius);
    ctx.lineTo(g.x - g.radius, g.y);
    ctx.closePath();
    ctx.fill();
  }
}

// 画面上部のHUD（HPバー・経験値バー・タイマー・撃破数）
function drawHud(w, h) {
  // --- HPバー ---
  const hpW = 240, hpH = 18, pad = 16;
  ctx.fillStyle = "rgba(0,0,0,0.5)";
  ctx.fillRect(pad, pad, hpW, hpH);
  ctx.fillStyle = "#e55";
  ctx.fillRect(pad, pad, hpW * (player.hp / player.maxHp), hpH);
  ctx.strokeStyle = "#fff";
  ctx.strokeRect(pad, pad, hpW, hpH);
  ctx.fillStyle = "#fff";
  ctx.font = "12px sans-serif";
  ctx.textAlign = "left";
  ctx.fillText(`HP ${Math.ceil(player.hp)} / ${player.maxHp}`, pad + 6, pad + 13);

  // --- 経験値バー ---
  const xpY = pad + hpH + 6;
  const needed = CONFIG.xpToLevel(player.level);
  ctx.fillStyle = "rgba(0,0,0,0.5)";
  ctx.fillRect(pad, xpY, hpW, 10);
  ctx.fillStyle = "#5cf";
  ctx.fillRect(pad, xpY, hpW * Math.min(1, player.xp / needed), 10);
  ctx.strokeRect(pad, xpY, hpW, 10);
  ctx.fillStyle = "#fff";
  ctx.fillText(`Lv.${player.level}`, pad + hpW + 10, xpY + 9);

  // --- 残り時間（中央上） ---
  const remain = Math.max(0, stage.duration - stageTime);
  const mm = String(Math.floor(remain / 60)).padStart(2, "0");
  const ss = String(Math.floor(remain % 60)).padStart(2, "0");
  ctx.font = "bold 28px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText(`${mm}:${ss}`, w / 2, pad + 26);

  // --- 撃破数（右上） ---
  ctx.font = "16px sans-serif";
  ctx.textAlign = "right";
  ctx.fillText(`撃破 ${killCount}`, w - pad, pad + 16);

  // --- お知らせメッセージ（中央。残り1秒からフェードアウト） ---
  if (message) {
    ctx.globalAlpha = Math.min(1, message.timer);
    ctx.fillStyle = "#ffdd55";
    ctx.font = "bold 36px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(message.text, w / 2, h * 0.3);
    ctx.globalAlpha = 1;
  }
}

/* ==============================
 * 6. メインループ・画面遷移
 * ============================== */

let lastTime = 0;

function gameLoop(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.1);  // タブ復帰時の暴走防止に上限を設ける
  lastTime = now;

  if (gameState === "playing") {
    update(dt);
    draw();
  }
  requestAnimationFrame(gameLoop);
}

// --- レベルアップ画面 ---
const levelupScreen = document.getElementById("levelup-screen");
const upgradeCards = document.getElementById("upgrade-cards");

let levelupPicks = [];  // 表示中の強化候補
let levelupIndex = 0;   // 選択中のカード番号

function showLevelUp() {
  gameState = "levelup";

  // 候補からランダムに3つ選ぶ（重複なし）
  const pool = [...UPGRADES];
  levelupPicks = [];
  while (levelupPicks.length < 3 && pool.length > 0) {
    levelupPicks.push(pool.splice(Math.floor(Math.random() * pool.length), 1)[0]);
  }
  levelupIndex = 0;

  upgradeCards.innerHTML = "";
  levelupPicks.forEach((up, i) => {
    const card = document.createElement("div");
    card.className = "upgrade-card";
    card.innerHTML = `<h3>${up.name}</h3><p>${up.desc}</p>`;
    card.addEventListener("click", () => chooseUpgrade(i));
    card.addEventListener("mouseenter", () => { levelupIndex = i; updateLevelupSelection(); });
    upgradeCards.appendChild(card);
  });
  updateLevelupSelection();
  levelupScreen.classList.remove("hidden");
}

// 選択中のカードにハイライトを付け替える
function updateLevelupSelection() {
  [...upgradeCards.children].forEach((card, i) => {
    card.classList.toggle("selected", i === levelupIndex);
  });
}

function chooseUpgrade(index) {
  levelupPicks[index].apply(player);
  levelupScreen.classList.add("hidden");
  gameState = "playing";
}

// レベルアップ画面のキーボード操作（↑↓で選択、Enter / Space で決定）
window.addEventListener("keydown", e => {
  if (gameState !== "levelup") return;
  const key = e.key.toLowerCase();
  if (key === "arrowup" || key === "w") {
    levelupIndex = (levelupIndex + levelupPicks.length - 1) % levelupPicks.length;
    updateLevelupSelection();
    e.preventDefault();
  } else if (key === "arrowdown" || key === "s") {
    levelupIndex = (levelupIndex + 1) % levelupPicks.length;
    updateLevelupSelection();
    e.preventDefault();
  } else if (key === "enter" || key === " ") {
    chooseUpgrade(levelupIndex);
    e.preventDefault();
  }
});

// --- リザルト画面 ---
const resultScreen = document.getElementById("result-screen");

function showResult(isVictory) {
  gameState = "result";
  document.getElementById("result-title").textContent =
    isVictory ? "ステージクリア！" : "ゲームオーバー";
  document.getElementById("result-detail").textContent =
    `生存時間 ${Math.floor(stageTime)}秒 ／ 撃破数 ${killCount} ／ Lv.${player.level}`;
  resultScreen.classList.remove("hidden");
}

// --- 画面遷移のボタン ---
document.getElementById("start-button").addEventListener("click", () => {
  document.getElementById("title-screen").classList.add("hidden");
  startGame();
});
document.getElementById("retry-button").addEventListener("click", () => {
  resultScreen.classList.add("hidden");
  startGame();
});

function startGame() {
  initStage(0);  // 現状はステージ1固定。将来ここでステージ選択する
  gameState = "playing";
}

// --- 起動 ---
loadAssets().then(() => {
  requestAnimationFrame(now => {
    lastTime = now;
    requestAnimationFrame(gameLoop);
  });
}).catch(err => {
  alert("画像の読み込みに失敗しました: " + err);
});
</script>
